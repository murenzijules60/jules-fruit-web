<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jules Fresh Fruits - Home</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    background:#f4fff4;
}
header{
    background:green;
    color:white;
    padding:20px 50px;
    display:flex;
    justify-content:space-between;
    align-items:center;

    position:fixed;
    top:0;
    left:0;
    width:100%;
    z-index:1000;
}
.logo{
    display:flex;
    align-items:center;
    gap:12px;
    font-size:30px;
    font-weight:bold;
}

.log{
    height:40px;
    width:40px;
    border-radius:50%;
    animation: spin 4s linear infinite;
}
@keyframes moveSide {
    0% {
        transform: translateX(0);
    }
    50% {
        transform: translateX(20px);
    }
    100% {
        transform: translateX(0);
    }
}

.logo{
    animation: moveSide 2s ease-in-out infinite;
}    

@keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}
.logo{
    display:flex;
    align-items:center;
    gap:12px;

    font-size:30px;
    font-weight:bold;
}

.log{
    height:50px;
    width:50px;
    border-radius:50%;
    object-fit:cover;
}

nav a{
    color:white;
    text-decoration:none;
    margin:0 15px;
    font-size:18px;
    transition:0.3s;
}

nav a:hover{
    color:yellow;
}

.hero{
    background:url('fruits.jpg') center/cover no-repeat;
    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    color:white;

    padding-top:80px;
}

.hero-content{
    background:rgba(0,0,0,0.5);
    padding:40px;
    border-radius:15px;
}

.hero-content h1{
    font-size:60px;
    margin-bottom:20px;
}

.hero-content p{
    font-size:22px;
    margin-bottom:25px;
}
.hero-content button{
    background:orange;
    border:none;
    padding:15px 30px;
    border-radius:8px;
    cursor:pointer;
    transition:0.3s;
}

.hero-content button:hover{
    background:darkorange;
}

.hero-content button a{
    color:white;
    text-decoration:none;
    font-size:18px;
}
footer{
    background:#111;
    color:white;
    text-align:center;
    padding:40px;
}

</style>
</head>

<body>

<header>
    <div class="logo">
        <img src="logo.png" class="log" alt="Logo">
        <span>Jules Fresh Fruits</span>
    </div>

    <nav>
        <a href="#">Home</a>
        <a href="services.html">Services</a>
        <a href="contact.html">Contact</a>
    </nav>

</header>
<section class="hero">

    <div class="hero-content">
        <h1>Fresh & Healthy Fruits</h1>

        <p>Enjoy natural fruits directly from the farm</p>

        <button>
            <a href="fruits buy.html"><i class="fa-solid fa-cart-shopping"></i>  Shop Now</a>
        </button>
    </div>

</section>
<footer>
    <p>&copy; 2026 Jules Fresh Fruits Market | All Rights Reserved</p>
</footer>

</body>
</html>
